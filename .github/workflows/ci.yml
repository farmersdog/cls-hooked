name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Formatting check
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22: AsyncLocalStorage backed by async_hooks internals
        # 24+: AsyncLocalStorage backed by AsyncContextFrame
        node-version: ["22", "24", "26"]
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm run test

  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: npm run compile
      - name: Type declaration compatibility
        run: npm run test:types
      - name: Verify CommonJS drop-in interface
        run: |
          node -e "
          const cls = require('./dist/index.js');
          const assert = require('assert');
          assert.equal(typeof cls.createNamespace, 'function', 'createNamespace must be a named CJS export');
          assert.equal(typeof cls.getNamespace, 'function');
          assert.equal(typeof cls.destroyNamespace, 'function');
          assert.equal(typeof cls.reset, 'function');
          assert.equal(cls.ERROR_SYMBOL, 'error@context');
          const ns = cls.createNamespace('smoke');
          ns.run(() => { ns.set('k', 1); assert.equal(ns.get('k'), 1); });
          console.log('CJS drop-in interface OK');
          "
